<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kikkert Kamera</title>
<style>
  :root{
    --bg:#0a0e12;--glass:rgba(255,255,255,.07);--glass-line:rgba(255,255,255,.14);
    --amber:#ffb454;--teal:#46d3c8;--text:#f2f5f7;--muted:#8a97a3;--red:#ff5a5f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    user-select:none;-webkit-user-select:none}
  .screen{position:fixed;inset:0;display:none}
  .screen.active{display:block}
  button{font-family:inherit;cursor:pointer}

  /* ---------- KAMERA ---------- */
  #stage{position:absolute;inset:0;bottom:74px;background:#000;overflow:hidden}
  video{position:absolute;top:50%;left:50%;width:100%;height:100%;
    object-fit:cover;transform:translate(-50%,-50%);transform-origin:center}
  video.mirror{transform:translate(-50%,-50%) scaleX(-1)}
  #reticle{position:absolute;inset:0;pointer-events:none;opacity:.5;transition:opacity .3s}
  #reticle.hide{opacity:0}
  .ret-line{position:absolute;background:rgba(255,180,84,.55)}
  .ret-h{left:50%;top:50%;width:26px;height:2px;transform:translate(-50%,-50%)}
  .ret-v{left:50%;top:50%;width:2px;height:26px;transform:translate(-50%,-50%)}
  .corner{position:absolute;width:34px;height:34px;border:2px solid rgba(255,255,255,.35)}
  .c-tl{top:14%;left:12%;border-right:none;border-bottom:none}
  .c-tr{top:14%;right:12%;border-left:none;border-bottom:none}
  .c-bl{bottom:16%;left:12%;border-right:none;border-top:none}
  .c-br{bottom:16%;right:12%;border-left:none;border-top:none}

  /* rudenet / grid */
  #grid3{position:absolute;inset:0;pointer-events:none;display:none}
  #grid3.on{display:block}
  #grid3 span{position:absolute;background:rgba(255,255,255,.22)}
  #grid3 .gv1{left:33.33%;top:0;bottom:0;width:1px}
  #grid3 .gv2{left:66.66%;top:0;bottom:0;width:1px}
  #grid3 .gh1{top:33.33%;left:0;right:0;height:1px}
  #grid3 .gh2{top:66.66%;left:0;right:0;height:1px}

  #topbar{position:absolute;top:0;left:0;right:0;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #topLeft,#topRight{display:flex;gap:8px;align-items:center}
  .chip{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:12px;padding:8px 10px;border-radius:100px;display:flex;
    align-items:center;gap:5px;min-height:34px}
  .chip.on{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  .chip svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #zoomWrap{position:absolute;top:calc(env(safe-area-inset-top) + 54px);left:0;right:0;
    display:flex;justify-content:center;pointer-events:none}
  #zoomRead{font-variant-numeric:tabular-nums;font-weight:700;font-size:26px;
    color:var(--amber);text-shadow:0 0 18px rgba(255,180,84,.45);line-height:1}
  #zoomRead small{font-size:13px;opacity:.75;font-weight:600}
  #digTag{margin-left:8px;align-self:center;font-size:10px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:#0a0e12;background:var(--teal);padding:3px 8px;
    border-radius:100px;opacity:0;transition:opacity .2s;pointer-events:none}
  #digTag.on{opacity:1}

  #rail{position:absolute;right:12px;top:46%;transform:translateY(-50%);
    height:46%;width:50px;display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;gap:6px;touch-action:none}
  .rail-cap{font-size:10px;font-weight:700;color:var(--muted);text-align:center}
  #track{position:relative;flex:1;width:42px;border-radius:24px;background:var(--glass);
    border:1px solid var(--glass-line);overflow:hidden}
  #fill{position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(to top,rgba(255,180,84,.35),rgba(255,180,84,.08))}
  #knob{position:absolute;left:50%;transform:translate(-50%,50%);
    width:38px;height:38px;border-radius:50%;background:var(--amber);
    border:3px solid #1a1f26;box-shadow:0 0 16px rgba(255,180,84,.6);
    display:flex;align-items:center;justify-content:center;font-size:10px;
    font-weight:800;color:#1a1f26}

  /* filter-strip */
  #filterStrip{position:absolute;left:0;right:0;bottom:8px;display:flex;gap:8px;
    overflow-x:auto;padding:0 12px 4px;scrollbar-width:none}
  #filterStrip::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;background:var(--glass);border:1px solid var(--glass-line);
    color:var(--text);font-weight:700;font-size:12px;padding:7px 12px;border-radius:100px}
  .fchip.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}

  #presets{position:absolute;bottom:48px;left:0;right:0;display:flex;
    justify-content:center;gap:8px;padding:0 12px}
  .preset{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:12px;padding:6px 10px;border-radius:100px;min-width:40px}
  .preset.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}

  #camControls{position:absolute;left:0;right:0;bottom:74px;
    padding-bottom:14px;padding-top:8px;display:flex;align-items:center;
    justify-content:center;gap:34px;background:linear-gradient(to top,rgba(0,0,0,.55),transparent)}
  .round{width:50px;height:50px;border-radius:50%;background:var(--glass);
    border:1px solid var(--glass-line);display:flex;align-items:center;justify-content:center}
  .round svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .round.on{background:var(--amber);border-color:var(--amber)}
  .round.on svg{stroke:#1a1f26}
  #shutter{width:74px;height:74px;border-radius:50%;background:transparent;
    border:4px solid #fff;display:flex;align-items:center;justify-content:center;padding:0;position:relative}
  #shutterInner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .15s}
  #shutter.rec #shutterInner{width:30px;height:30px;border-radius:8px;background:var(--red)}
  #shutter:active #shutterInner{transform:scale(.9)}
  #recTime{position:absolute;top:-30px;left:50%;transform:translateX(-50%);
    background:var(--red);color:#fff;font-weight:800;font-size:12px;padding:3px 9px;
    border-radius:100px;display:none;white-space:nowrap}
  #recTime.on{display:block}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  #flash.pop{animation:pop .28s ease}
  @keyframes pop{0%{opacity:.85}100%{opacity:0}}
  #count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-size:120px;font-weight:800;color:#fff;text-shadow:0 0 30px rgba(0,0,0,.6);pointer-events:none}
  #count.on{display:flex}

  /* QR-resultat */
  #qrToast{position:absolute;left:16px;right:16px;bottom:150px;background:#111820;
    border:1px solid var(--teal);border-radius:14px;padding:14px 16px;display:none;z-index:6}
  #qrToast.on{display:block}
  #qrToast p{font-size:12px;color:var(--muted);margin-bottom:6px}
  #qrToast a{color:var(--teal);font-weight:700;font-size:15px;word-break:break-all}

  /* ---------- GALLERI ---------- */
  #galHead{position:absolute;top:0;left:0;right:0;z-index:2;
    padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:linear-gradient(to bottom,var(--bg),rgba(10,14,18,.85))}
  #galHead h1{font-size:21px;font-weight:800;white-space:nowrap}
  #galHead h1 span{color:var(--amber);font-weight:600;font-size:13px;margin-left:6px}
  #galBtns{display:flex;gap:8px}
  .gbtn{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:13px;padding:9px 13px;border-radius:100px;display:flex;align-items:center;gap:5px}
  .gbtn.amber{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  .gbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  #grid{position:absolute;inset:0;bottom:74px;overflow-y:auto;
    padding:calc(env(safe-area-inset-top) + 72px) 3px 16px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:3px;align-content:start}
  .cell{position:relative;aspect-ratio:1;background:#151a20;border-radius:4px;overflow:hidden}
  .cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block}
  .cell .vid-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.6);
    color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:100px}
  .cell .check{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;
    border:2px solid #fff;background:rgba(0,0,0,.35);display:none}
  .cell.sel .check{display:block;background:var(--amber);border-color:var(--amber)}
  .cell.sel::after{content:"";position:absolute;inset:0;border:3px solid var(--amber);border-radius:4px}
  #empty{position:absolute;inset:0;bottom:74px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:32px;gap:12px;color:var(--muted)}
  #empty svg{width:56px;height:56px;stroke:var(--muted);fill:none;stroke-width:1.5}
  #empty b{color:var(--text);font-size:17px}
  #selBar{position:absolute;bottom:74px;left:0;right:0;display:none;gap:10px;
    padding:12px 16px calc(12px);background:#111820;border-top:1px solid var(--glass-line);z-index:3}
  #selBar.on{display:flex}
  #selBar button{flex:1;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:14px;padding:11px;border-radius:12px}
  #selBar .del{color:var(--red);border-color:rgba(255,90,95,.4)}

  /* ---------- BUNDMENU ---------- */
  #tabs{position:absolute;bottom:0;left:0;right:0;height:74px;
    padding-bottom:env(safe-area-inset-bottom);display:flex;
    background:#111820;border-top:1px solid var(--glass-line);z-index:5}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;color:var(--muted);font-size:11px;font-weight:700;background:none;border:none}
  .tab svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--amber)}
  .tab.active svg{stroke:var(--amber)}

  /* ---------- VISER ---------- */
  #viewer{position:fixed;inset:0;background:#000;z-index:20;display:none;flex-direction:column}
  #viewer.on{display:flex}
  #viewImgWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #viewImg{max-width:100%;max-height:100%;object-fit:contain}
  #viewVid{max-width:100%;max-height:100%}
  #viewBar{padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;display:flex;
    justify-content:space-between;align-items:center;gap:8px}
  #viewBar button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:15px;padding:10px 16px;border-radius:100px}
  #vDel{color:var(--red);border-color:rgba(255,90,95,.4)}
  #viewFoot{padding:14px 18px calc(env(safe-area-inset-bottom) + 14px);display:flex;gap:10px;justify-content:center}
  #viewFoot button{flex:1;max-width:180px;background:var(--glass);border:1px solid var(--glass-line);
    color:var(--text);font-weight:700;font-size:15px;padding:12px;border-radius:100px}
  #vShare{background:var(--amber);color:#1a1f26;border-color:var(--amber)}

  /* ---------- EDITOR (efter foto) ---------- */
  #editor{position:fixed;inset:0;background:#000;z-index:25;display:none;flex-direction:column}
  #editor.on{display:flex}
  #editArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #editStage{position:relative;max-width:100%;max-height:100%}
  #editImg{display:block;max-width:100%;max-height:100%;object-fit:contain}
  .ov{position:absolute;transform:translate(-50%,-50%);touch-action:none;cursor:grab;
    padding:4px 6px;white-space:nowrap}
  .ov.txt{color:#fff;font-weight:800;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .ov.emo{font-size:56px;line-height:1}
  .ov.pick{outline:2px dashed rgba(255,255,255,.6)}
  #editTop{padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;display:flex;
    justify-content:space-between;align-items:center}
  #editTop button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:15px;padding:10px 16px;border-radius:100px}
  #editSave{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #editTools{display:flex;gap:8px;overflow-x:auto;padding:10px 12px;scrollbar-width:none}
  #editTools::-webkit-scrollbar{display:none}
  #editFilters{display:flex;gap:8px;overflow-x:auto;padding:0 12px 6px;scrollbar-width:none}
  #editFilters::-webkit-scrollbar{display:none}
  #editFoot{padding:8px 12px calc(env(safe-area-inset-bottom) + 12px);display:flex;
    gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
  #editFoot button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:14px;padding:10px 14px;border-radius:100px}
  #emojiRow{display:none;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 12px 6px}
  #emojiRow.on{display:flex}
  #emojiRow button{font-size:28px;background:var(--glass);border:1px solid var(--glass-line);
    border-radius:12px;padding:4px 8px;line-height:1}
  #delOv{color:var(--red);border-color:rgba(255,90,95,.4)!important;display:none}
  #delOv.on{display:inline-block}

  /* start-overlay */
  #overlay{position:absolute;inset:0;bottom:74px;background:rgba(6,9,12,.94);z-index:8;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;gap:16px}
  #overlay h1{font-size:25px;font-weight:800}
  #overlay h1 span{color:var(--amber)}
  #overlay p{color:var(--muted);font-size:15px;max-width:320px;line-height:1.5}
  #startBtn{margin-top:4px;background:var(--amber);color:#1a1f26;border:none;font-weight:800;
    font-size:17px;padding:14px 32px;border-radius:100px;box-shadow:0 0 24px rgba(255,180,84,.45)}
  .badge{display:flex;align-items:center;gap:9px;color:var(--teal);font-weight:700;
    font-size:13px;letter-spacing:1px;text-transform:uppercase}
  #errMsg{color:var(--red);font-weight:600;display:none}
  .hidden{display:none!important}

  /* tema-ark */
  #themeSheet{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:none;
    align-items:flex-end}
  #themeSheet.on{display:flex}
  #themeCard{background:#111820;width:100%;border-radius:20px 20px 0 0;padding:22px 20px calc(env(safe-area-inset-bottom) + 22px)}
  #themeCard h2{font-size:18px;font-weight:800;margin-bottom:14px}
  #swatches{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .sw{width:44px;height:44px;border-radius:50%;border:3px solid transparent}
  .sw.active{border-color:#fff}
  #themeClose{width:100%;background:var(--amber);color:#1a1f26;border:none;font-weight:800;
    font-size:16px;padding:13px;border-radius:100px}
  @media (prefers-reduced-motion:reduce){#flash.pop{animation:none}}
</style>
</head>
<body>

<!-- ============ KAMERA ============ -->
<section id="camScreen" class="screen active">
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <div id="grid3"><span class="gv1"></span><span class="gv2"></span><span class="gh1"></span><span class="gh2"></span></div>
    <div id="reticle">
      <div class="ret-line ret-h"></div><div class="ret-line ret-v"></div>
      <div class="corner c-tl"></div><div class="corner c-tr"></div>
      <div class="corner c-bl"></div><div class="corner c-br"></div>
    </div>
    <div id="flash"></div>
    <div id="count"></div>

    <div id="topbar">
      <div id="topLeft">
        <button class="chip" id="timerChip"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg><span id="timerLbl">Off</span></button>
        <button class="chip" id="gridChip"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
      </div>
      <div id="topRight">
        <button class="chip" id="qrChip"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M21 14v7h-7"/></svg>QR</button>
        <button class="chip" id="themeChip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18 4 4 0 0 0 0-8 2 2 0 0 1 0-4 3 3 0 0 0 0-6z"/></svg></button>
      </div>
    </div>

    <div id="zoomWrap"><div id="zoomRead">1.0<small>x</small></div><div id="digTag">Digital</div></div>

    <div id="rail">
      <div class="rail-cap" id="maxCap">-</div>
      <div id="track"><div id="fill"></div><div id="knob">1x</div></div>
      <div class="rail-cap">1x</div>
    </div>

    <div id="presets"></div>
    <div id="filterStrip"></div>

    <div id="qrToast"><p>QR-kode fundet:</p><a id="qrLink" target="_blank" rel="noopener"></a></div>

    <div id="overlay">
      <div class="badge">&#9673; Optisk instrument</div>
      <h1>Kikkert <span>Kamera</span></h1>
      <p>Zoom, filtre, video og galleri. Tryk start for at give kameraet adgang.</p>
      <button id="startBtn">Start kamera</button>
      <p id="errMsg"></p>
    </div>
  </div>

  <div id="camControls">
    <button class="round" id="torchBtn" aria-label="Lygte">
      <svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
    </button>
    <button id="shutter" aria-label="Tag foto"><span id="recTime">0:00</span><div id="shutterInner"></div></button>
    <button class="round" id="flipBtn" aria-label="Skift kamera">
      <svg viewBox="0 0 24 24"><path d="M21 8a9 9 0 0 0-15-3L3 8"/><path d="M3 3v5h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3"/><path d="M21 21v-5h-5"/></svg>
    </button>
  </div>
</section>

<!-- ============ GALLERI ============ -->
<section id="galScreen" class="screen">
  <div id="galHead">
    <h1>Galleri <span id="galCount"></span></h1>
    <div id="galBtns">
      <button class="gbtn" id="selectBtn">Vælg</button>
      <button class="gbtn amber" id="importBtn"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Importer</button>
    </div>
  </div>
  <div id="grid"></div>
  <div id="empty">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <b>Ingen billeder endnu</b>
    <p style="color:var(--muted);font-size:14px;max-width:260px">Tag et foto eller en video med kameraet, eller tryk Importer.</p>
  </div>
  <div id="selBar">
    <button id="selShare">Del</button>
    <button id="selDownload">Download</button>
    <button class="del" id="selDelete">Slet</button>
  </div>
</section>

<!-- ============ BUNDMENU ============ -->
<nav id="tabs">
  <button class="tab active" data-screen="camScreen">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Kamera
  </button>
  <button class="tab" data-screen="galScreen">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    Galleri
  </button>
</nav>

<!-- ============ VISER ============ -->
<div id="viewer">
  <div id="viewBar"><button id="vClose">Luk</button><button id="vDel">Slet</button></div>
  <div id="viewImgWrap"><img id="viewImg" alt="Foto"><video id="viewVid" controls playsinline class="hidden"></video></div>
  <div id="viewFoot"><button id="vDownload">Gem på telefon</button><button id="vShare">Del</button></div>
</div>

<!-- ============ EDITOR ============ -->
<div id="editor">
  <div id="editTop"><button id="editCancel">Kassér</button><button id="editSave">Gem</button></div>
  <div id="editArea"><div id="editStage"><img id="editImg" alt="Rediger"></div></div>
  <div id="editFilters"></div>
  <div id="emojiRow"></div>
  <div id="editFoot">
    <button id="addText">Tekst</button>
    <button id="addEmoji">Emoji</button>
    <button id="delOv">Slet valgt</button>
  </div>
</div>

<!-- ============ TEMA ============ -->
<div id="themeSheet">
  <div id="themeCard">
    <h2>Vælg farve</h2>
    <div id="swatches"></div>
    <button id="themeClose">Færdig</button>
  </div>
</div>

<input id="fileInput" type="file" accept="image/*" multiple class="hidden">

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};

  /* ---------------- IndexedDB ---------------- */
  var DB_NAME='kikkertkamera', STORE='photos', db=null;
  function openDB(){return new Promise(function(res,rej){
    var r=indexedDB.open(DB_NAME,1);
    r.onupgradeneeded=function(e){var d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};
    r.onsuccess=function(e){db=e.target.result;res(db);};
    r.onerror=function(e){rej(e);};
  });}
  function saveItem(blob,kind){return new Promise(function(res,rej){
    var id=Date.now()+'-'+Math.random().toString(36).slice(2,7);
    var tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put({id:id,blob:blob,kind:kind||'photo',created:Date.now()});
    tx.oncomplete=function(){res(id);};tx.onerror=function(e){rej(e);};
  });}
  function allItems(){return new Promise(function(res,rej){
    var tx=db.transaction(STORE,'readonly');var rq=tx.objectStore(STORE).getAll();
    rq.onsuccess=function(){res(rq.result.sort(function(a,b){return b.created-a.created;}));};
    rq.onerror=function(e){rej(e);};
  });}
  function delItem(id){return new Promise(function(res,rej){
    var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);
    tx.oncomplete=function(){res();};tx.onerror=function(e){rej(e);};
  });}

  /* ---------------- Elementer ---------------- */
  var video=$('video'),zoomRead=$('zoomRead'),digTag=$('digTag'),rail=$('rail'),
    track=$('track'),fill=$('fill'),knob=$('knob'),maxCap=$('maxCap'),presets=$('presets'),
    overlay=$('overlay'),startBtn=$('startBtn'),errMsg=$('errMsg'),shutter=$('shutter'),
    flipBtn=$('flipBtn'),torchBtn=$('torchBtn'),flash=$('flash'),reticle=$('reticle'),
    grid=$('grid'),empty=$('empty'),galCount=$('galCount'),importBtn=$('importBtn'),
    fileInput=$('fileInput'),viewer=$('viewer'),viewImg=$('viewImg'),viewVid=$('viewVid'),
    filterStrip=$('filterStrip'),grid3=$('grid3'),count=$('count'),recTime=$('recTime'),
    timerChip=$('timerChip'),timerLbl=$('timerLbl'),gridChip=$('gridChip'),qrChip=$('qrChip'),
    qrToast=$('qrToast'),qrLink=$('qrLink'),themeChip=$('themeChip');

  /* ---------------- Filtre ---------------- */
  var FILTERS=[
    {n:'Ingen',f:'none'},
    {n:'S/H',f:'grayscale(1) contrast(1.05)'},
    {n:'Varm',f:'saturate(1.3) sepia(.25) contrast(1.05)'},
    {n:'Kold',f:'saturate(1.1) hue-rotate(-12deg) brightness(1.05)'},
    {n:'Vintage',f:'sepia(.5) contrast(.95) brightness(1.05) saturate(1.2)'},
    {n:'Klar',f:'brightness(1.12) contrast(1.1) saturate(1.15)'},
    {n:'Drama',f:'contrast(1.4) brightness(.95) saturate(1.1)'},
    {n:'Neon',f:'saturate(2) hue-rotate(15deg) contrast(1.1)'}
  ];
  var camFilter='none';
  function buildFilterStrip(){
    filterStrip.innerHTML='';
    FILTERS.forEach(function(fl){
      var b=document.createElement('button');b.className='fchip'+(fl.f===camFilter?' active':'');
      b.textContent=fl.n;
      b.addEventListener('click',function(){
        camFilter=fl.f;video.style.filter=fl.f==='none'?'':fl.f;
        [].slice.call(filterStrip.children).forEach(function(c){c.classList.remove('active');});
        b.classList.add('active');
      });
      filterStrip.appendChild(b);
    });
  }

  /* ---------------- Kamera ---------------- */
  var stream=null,trackObj=null,caps=null,facing='environment';
  var nativeMax=1,hasNativeZoom=false,digitalMaxMult=6,totalMin=1,totalMax=1,current=1;
  var hasTorch=false,torchOn=false;

  function err(m){errMsg.style.display='block';errMsg.innerHTML=m;}
  function insecure(){return !window.isSecureContext||location.protocol==='content:'||location.protocol==='file:';}

  function startCam(){
    errMsg.style.display='none';
    if(insecure()){err('Åbn appen via din https-adresse (github.io), ikke som lokal fil.');return;}
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){err('Din browser understøtter ikke kamera. Prøv Chrome eller Safari.');return;}
    var wantHi=(facing==='environment');
    var vc=wantHi?{facingMode:{ideal:facing},width:{ideal:3840},height:{ideal:2160}}
                 :{facingMode:{ideal:facing}};   /* frontkamera: ingen 4K-krav */
    if(stream)stream.getTracks().forEach(function(t){t.stop();});
    navigator.mediaDevices.getUserMedia({video:vc,audio:true}).then(function(s){
      stream=s;video.srcObject=s;trackObj=s.getVideoTracks()[0];
      caps=trackObj.getCapabilities?trackObj.getCapabilities():{};
      video.classList.toggle('mirror',facing==='user');
      setupZoom();setupTorch();overlay.classList.add('hidden');
    }).catch(function(e){
      /* fald tilbage uden krav hvis 4K fejlede */
      if(wantHi){navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing}},audio:true})
        .then(function(s){stream=s;video.srcObject=s;trackObj=s.getVideoTracks()[0];
          caps=trackObj.getCapabilities?trackObj.getCapabilities():{};
          video.classList.toggle('mirror',facing==='user');
          setupZoom();setupTorch();overlay.classList.add('hidden');})
        .catch(showCamErr);return;}
      showCamErr(e);
    });
  }
  function showCamErr(e){
    if(e&&e.name==='NotAllowedError')err('Kamera-adgang blev afvist. Tryk "Tillad" når browseren spørger.');
    else if(e&&e.name==='NotFoundError')err('Fandt intet kamera på denne enhed.');
    else err('Kunne ikke starte kameraet: '+(e&&e.message?e.message:e));
    overlay.classList.remove('hidden');
  }
  function setupZoom(){
    hasNativeZoom=!!(caps&&caps.zoom);
    nativeMax=hasNativeZoom?(caps.zoom.max||1):1;
    totalMin=1;totalMax=Math.max(nativeMax,1)*digitalMaxMult;current=1;
    maxCap.textContent=Math.round(totalMax)+'x';buildPresets();applyZoom(1);
  }
  function buildPresets(){
    presets.innerHTML='';var vals=[1];
    if(nativeMax>=2)vals.push(2);
    if(nativeMax>=3)vals.push(Math.round(nativeMax));
    var d=Math.round(totalMax);[Math.round(totalMax/2),d].forEach(function(v){if(v>vals[vals.length-1])vals.push(v);});
    vals=vals.filter(function(v,i){return vals.indexOf(v)===i&&v>=1&&v<=totalMax;}).slice(0,5);
    vals.forEach(function(v){var b=document.createElement('button');b.className='preset';b.dataset.v=v;
      b.textContent=(v>=10?Math.round(v):(v%1?v.toFixed(1):v))+'x';
      b.addEventListener('click',function(){applyZoom(v);});presets.appendChild(b);});
  }
  function applyZoom(total){
    total=Math.min(Math.max(total,totalMin),totalMax);current=total;
    var nv=Math.min(total,nativeMax),dig=total/nv;
    if(hasNativeZoom){try{trackObj.applyConstraints({advanced:[{zoom:nv}]});}catch(e){}}
    var base='translate(-50%,-50%)'+(facing==='user'?' scaleX(-1)':'');
    video.style.transform=base+' scale('+dig.toFixed(3)+')';
    digTag.classList.toggle('on',dig>1.001);reticle.classList.toggle('hide',total<1.05);
    var s=total>=10?total.toFixed(0):total.toFixed(1);
    zoomRead.innerHTML=s+'<small>x</small>';knob.textContent=(total>=10?total.toFixed(0):total.toFixed(1))+'x';
    var t=Math.log(total/totalMin)/Math.log(totalMax/totalMin),h=track.clientHeight;
    knob.style.bottom=(t*(h-38)+2)+'px';knob.style.top='auto';fill.style.height=(t*100)+'%';
    [].slice.call(document.querySelectorAll('.preset')).forEach(function(p){p.classList.toggle('active',Math.abs(parseFloat(p.dataset.v)-total)<.05);});
  }
  var dragging=false;
  function railZoom(y){var r=track.getBoundingClientRect();var t=1-(y-r.top)/r.height;t=Math.min(Math.max(t,0),1);applyZoom(totalMin*Math.pow(totalMax/totalMin,t));}
  function dn(e){dragging=true;mv(e);}
  function mv(e){if(!dragging)return;e.preventDefault();railZoom(e.touches?e.touches[0].clientY:e.clientY);}
  function up(){dragging=false;}
  rail.addEventListener('touchstart',dn,{passive:false});rail.addEventListener('touchmove',mv,{passive:false});rail.addEventListener('touchend',up);
  rail.addEventListener('mousedown',dn);window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  var pStart=0,pZoom=1;
  video.parentElement.addEventListener('touchstart',function(e){if(e.touches.length===2){pStart=dist(e.touches);pZoom=current;}},{passive:false});
  video.parentElement.addEventListener('touchmove',function(e){if(e.touches.length===2){e.preventDefault();applyZoom(pZoom*dist(e.touches)/pStart);}},{passive:false});
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

  function setupTorch(){hasTorch=!!(caps&&caps.torch);torchBtn.style.opacity=hasTorch?'1':'.35';torchOn=false;torchBtn.classList.remove('on');}
  torchBtn.addEventListener('click',function(){if(!hasTorch)return;torchOn=!torchOn;try{trackObj.applyConstraints({advanced:[{torch:torchOn}]});}catch(e){}torchBtn.classList.toggle('on',torchOn);});
  flipBtn.addEventListener('click',function(){facing=(facing==='environment')?'user':'environment';startCam();});

  /* ---------------- Timer & grid ---------------- */
  var TIMERS=[0,3,5,10],ti=0;
  timerChip.addEventListener('click',function(){ti=(ti+1)%TIMERS.length;var v=TIMERS[ti];timerLbl.textContent=v?v+'s':'Off';timerChip.classList.toggle('on',v>0);});
  gridChip.addEventListener('click',function(){grid3.classList.toggle('on');gridChip.classList.toggle('on',grid3.classList.contains('on'));});

  function runCountdown(sec){return new Promise(function(res){
    if(!sec){res();return;}
    var n=sec;count.classList.add('on');count.textContent=n;
    var iv=setInterval(function(){n--;if(n<=0){clearInterval(iv);count.classList.remove('on');res();}else{count.textContent=n;}},1000);
  });}

  /* ---------------- Foto ---------------- */
  function grabFrame(){
    var vw=video.videoWidth,vh=video.videoHeight;if(!vw)return null;
    var dig=current/Math.min(current,nativeMax);
    var sw=vw/dig,sh=vh/dig,sx=(vw-sw)/2,sy=(vh-sh)/2;
    var cv=document.createElement('canvas');cv.width=Math.round(sw);cv.height=Math.round(sh);
    var ctx=cv.getContext('2d');
    if(camFilter!=='none')ctx.filter=camFilter;
    if(facing==='user'){ctx.translate(cv.width,0);ctx.scale(-1,1);}
    ctx.drawImage(video,sx,sy,sw,sh,0,0,cv.width,cv.height);
    return cv;
  }
  function takePhoto(){
    var cv=grabFrame();if(!cv)return;
    flash.classList.remove('pop');void flash.offsetWidth;flash.classList.add('pop');
    cv.toBlob(function(blob){openEditor(blob);},'image/jpeg',.95);
  }

  /* ---------------- Video ---------------- */
  var rec=null,chunks=[],recTimer=null,recSecs=0,recording=false;
  function startRec(){
    if(!stream)return;
    var opts={};['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'].some(function(m){
      if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)){opts.mimeType=m;return true;}return false;});
    try{rec=new MediaRecorder(stream,opts);}catch(e){try{rec=new MediaRecorder(stream);}catch(e2){alert('Video understøttes ikke i denne browser.');return;}}
    chunks=[];
    rec.ondataavailable=function(e){if(e.data&&e.data.size)chunks.push(e.data);};
    rec.onstop=function(){var blob=new Blob(chunks,{type:(rec.mimeType||'video/webm')});saveItem(blob,'video').then(refreshGallery);};
    rec.start();recording=true;shutter.classList.add('rec');
    recSecs=0;recTime.textContent='0:00';recTime.classList.add('on');
    recTimer=setInterval(function(){recSecs++;var m=Math.floor(recSecs/60),s=recSecs%60;recTime.textContent=m+':'+(s<10?'0':'')+s;},1000);
  }
  function stopRec(){
    if(rec&&recording){try{rec.stop();}catch(e){}}
    recording=false;shutter.classList.remove('rec');recTime.classList.remove('on');
    if(recTimer){clearInterval(recTimer);recTimer=null;}
  }
  /* tryk = foto (med timer), hold = video */
  var holdTimer=null,didHold=false;
  shutter.addEventListener('pointerdown',function(){
    didHold=false;
    holdTimer=setTimeout(function(){didHold=true;startRec();},450);
  });
  function shutterUp(){
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
    if(recording){stopRec();return;}
    if(!didHold){runCountdown(TIMERS[ti]).then(takePhoto);}
  }
  shutter.addEventListener('pointerup',shutterUp);
  shutter.addEventListener('pointercancel',shutterUp);

  /* ---------------- QR-scanner ---------------- */
  var qrOn=false,qrRAF=null,detector=null;
  if('BarcodeDetector' in window){try{detector=new window.BarcodeDetector({formats:['qr_code']});}catch(e){detector=null;}}
  if(!detector)qrChip.style.opacity='.4';
  qrChip.addEventListener('click',function(){
    if(!detector){alert('QR-scanning understøttes ikke i denne browser.');return;}
    qrOn=!qrOn;qrChip.classList.toggle('on',qrOn);
    if(qrOn){scanQR();}else{qrToast.classList.remove('on');if(qrRAF)cancelAnimationFrame(qrRAF);}
  });
  function scanQR(){
    if(!qrOn||!detector||!video.videoWidth){qrRAF=requestAnimationFrame(scanQR);return;}
    detector.detect(video).then(function(codes){
      if(codes&&codes.length){var v=codes[0].rawValue;qrLink.textContent=v;
        qrLink.href=/^https?:\/\//i.test(v)?v:'#';qrToast.classList.add('on');}
    }).catch(function(){});
    qrRAF=requestAnimationFrame(scanQR);
  }

  /* ---------------- Editor ---------------- */
  var editor=$('editor'),editImg=$('editImg'),editStage=$('editStage'),
    editFilters=$('editFilters'),emojiRow=$('emojiRow'),delOv=$('delOv');
  var editBlobUrl=null,editFilter='none',pickedOv=null;
  var EMOJIS=['😀','😎','😍','🔥','⭐','❤️','👍','🎉','🐶','🐱','🌈','💯','📸','✨','😂','👀'];

  function openEditor(blob){
    if(editBlobUrl)URL.revokeObjectURL(editBlobUrl);
    editBlobUrl=URL.createObjectURL(blob);editImg.src=editBlobUrl;
    editFilter='none';editImg.style.filter='';pickedOv=null;delOv.classList.remove('on');
    [].slice.call(editStage.querySelectorAll('.ov')).forEach(function(o){o.remove();});
    buildEditFilters();buildEmojiRow();emojiRow.classList.remove('on');
    editor.classList.add('on');
  }
  function closeEditor(){editor.classList.remove('on');}
  function buildEditFilters(){
    editFilters.innerHTML='';
    FILTERS.forEach(function(fl){
      var b=document.createElement('button');b.className='fchip'+(fl.f===editFilter?' active':'');
      b.textContent=fl.n;
      b.addEventListener('click',function(){editFilter=fl.f;editImg.style.filter=fl.f==='none'?'':fl.f;
        [].slice.call(editFilters.children).forEach(function(c){c.classList.remove('active');});b.classList.add('active');});
      editFilters.appendChild(b);
    });
  }
  function buildEmojiRow(){
    emojiRow.innerHTML='';
    EMOJIS.forEach(function(em){var b=document.createElement('button');b.textContent=em;
      b.addEventListener('click',function(){addOverlay('emo',em);emojiRow.classList.remove('on');});
      emojiRow.appendChild(b);});
  }
  function pickOverlay(el){
    if(pickedOv)pickedOv.classList.remove('pick');
    pickedOv=el;if(el)el.classList.add('pick');
    delOv.classList.toggle('on',!!el);
  }
  function addOverlay(kind,content){
    var el=document.createElement('div');el.className='ov '+(kind==='txt'?'txt':'emo');
    el.textContent=content;
    var r=editStage.getBoundingClientRect();
    el.dataset.x=0.5;el.dataset.y=0.5;
    el.style.left='50%';el.style.top='50%';
    editStage.appendChild(el);makeDraggable(el);pickOverlay(el);
  }
  function makeDraggable(el){
    var sx,sy,ox,oy,drag=false;
    el.addEventListener('pointerdown',function(e){
      e.stopPropagation();pickOverlay(el);drag=true;el.setPointerCapture(e.pointerId);
      var r=editStage.getBoundingClientRect();
      sx=e.clientX;sy=e.clientY;ox=parseFloat(el.dataset.x)*r.width;oy=parseFloat(el.dataset.y)*r.height;
    });
    el.addEventListener('pointermove',function(e){
      if(!drag)return;var r=editStage.getBoundingClientRect();
      var nx=(ox+(e.clientX-sx))/r.width,ny=(oy+(e.clientY-sy))/r.height;
      nx=Math.min(Math.max(nx,0),1);ny=Math.min(Math.max(ny,0),1);
      el.dataset.x=nx;el.dataset.y=ny;el.style.left=(nx*100)+'%';el.style.top=(ny*100)+'%';
    });
    el.addEventListener('pointerup',function(){drag=false;});
  }
  editImg.addEventListener('pointerdown',function(){pickOverlay(null);});
  $('addText').addEventListener('click',function(){
    var t=prompt('Skriv tekst:');if(t){addOverlay('txt',t);}
  });
  $('addEmoji').addEventListener('click',function(){emojiRow.classList.toggle('on');});
  delOv.addEventListener('click',function(){if(pickedOv){pickedOv.remove();pickOverlay(null);}});
  $('editCancel').addEventListener('click',closeEditor);
  $('editSave').addEventListener('click',function(){
    /* komponér billede + overlays i fuld oplaesning */
    var natW=editImg.naturalWidth,natH=editImg.naturalHeight;
    var cv=document.createElement('canvas');cv.width=natW;cv.height=natH;
    var ctx=cv.getContext('2d');
    if(editFilter!=='none')ctx.filter=editFilter;
    ctx.drawImage(editImg,0,0,natW,natH);
    ctx.filter='none';
    var stageRect=editImg.getBoundingClientRect();
    var scale=natW/stageRect.width;
    [].slice.call(editStage.querySelectorAll('.ov')).forEach(function(o){
      var x=parseFloat(o.dataset.x)*natW,y=parseFloat(o.dataset.y)*natH;
      if(o.classList.contains('txt')){
        var fs=28*scale;ctx.font='800 '+fs+'px -apple-system,Roboto,sans-serif';
        ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=8*scale;ctx.shadowOffsetY=2*scale;
        ctx.fillText(o.textContent,x,y);ctx.shadowColor='transparent';
      }else{
        var es=56*scale;ctx.font=es+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(o.textContent,x,y);
      }
    });
    cv.toBlob(function(blob){saveItem(blob,'photo').then(function(){closeEditor();refreshGallery();switchTo('galScreen');});},'image/jpeg',.95);
  });

  /* ---------------- Import ---------------- */
  importBtn.addEventListener('click',function(){fileInput.click();});
  fileInput.addEventListener('change',function(e){
    var files=[].slice.call(e.target.files),done=0;
    if(!files.length)return;
    files.forEach(function(f){
      if(f.type.indexOf('image/')===0){saveItem(f,'photo').then(fin);}
      else if(f.type.indexOf('video/')===0){saveItem(f,'video').then(fin);}else fin();
    });
    function fin(){done++;if(done===files.length){fileInput.value='';refreshGallery();switchTo('galScreen');}}
  });

  /* ---------------- Galleri ---------------- */
  var urls=[],items=[],selMode=false,selected={};
  function refreshGallery(){
    urls.forEach(function(u){URL.revokeObjectURL(u);});urls=[];
    return allItems().then(function(list){
      items=list;galCount.textContent=list.length?list.length+(list.length===1?' element':' elementer'):'';
      grid.innerHTML='';empty.style.display=list.length?'none':'flex';grid.style.display=list.length?'grid':'none';
      list.forEach(function(it){
        var u=URL.createObjectURL(it.blob);urls.push(u);
        var cell=document.createElement('div');cell.className='cell';cell.dataset.id=it.id;
        if(it.kind==='video'){
          var vd=document.createElement('video');vd.src=u;vd.muted=true;vd.playsInline=true;vd.preload='metadata';
          cell.appendChild(vd);var badge=document.createElement('div');badge.className='vid-badge';badge.textContent='▶';cell.appendChild(badge);
        }else{
          var img=document.createElement('img');img.src=u;img.loading='lazy';cell.appendChild(img);
        }
        var ck=document.createElement('div');ck.className='check';cell.appendChild(ck);
        cell.addEventListener('click',function(){
          if(selMode){toggleSel(it.id,cell);}else{openViewer(it,u);}
        });
        grid.appendChild(cell);
      });
    });
  }
  function toggleSel(id,cell){
    if(selected[id]){delete selected[id];cell.classList.remove('sel');}
    else{selected[id]=true;cell.classList.add('sel');}
  }
  $('selectBtn').addEventListener('click',function(){
    selMode=!selMode;selected={};
    [].slice.call(grid.querySelectorAll('.cell')).forEach(function(c){c.classList.remove('sel');});
    $('selBar').classList.toggle('on',selMode);
    $('selectBtn').textContent=selMode?'Annullér':'Vælg';
  });
  function selectedItems(){return items.filter(function(it){return selected[it.id];});}
  $('selDelete').addEventListener('click',function(){
    var s=selectedItems();if(!s.length)return;
    if(confirm('Slet '+s.length+' element(er)?')){
      Promise.all(s.map(function(it){return delItem(it.id);})).then(function(){
        selected={};selMode=false;$('selBar').classList.remove('on');$('selectBtn').textContent='Vælg';refreshGallery();});
    }
  });
  $('selDownload').addEventListener('click',function(){selectedItems().forEach(function(it){downloadItem(it);});});
  $('selShare').addEventListener('click',function(){shareItems(selectedItems());});

  function downloadItem(it){
    var u=URL.createObjectURL(it.blob);var a=document.createElement('a');
    a.href=u;a.download=(it.kind==='video'?'video-':'foto-')+it.id+(it.kind==='video'?'.webm':'.jpg');
    document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},4000);
  }
  function shareItems(list){
    if(!list.length)return;
    var files=list.map(function(it){return new File([it.blob],(it.kind==='video'?'video-':'foto-')+it.id+(it.kind==='video'?'.webm':'.jpg'),{type:it.blob.type||'image/jpeg'});});
    if(navigator.canShare&&navigator.canShare({files:files})){
      navigator.share({files:files}).catch(function(){});
    }else{list.forEach(downloadItem);}
  }

  /* ---------------- Viser ---------------- */
  var cur=null;
  function openViewer(it,u){
    cur=it;
    if(it.kind==='video'){viewImg.classList.add('hidden');viewVid.classList.remove('hidden');viewVid.src=u;}
    else{viewVid.classList.add('hidden');viewVid.pause&&viewVid.pause();viewImg.classList.remove('hidden');viewImg.src=u;}
    viewer.classList.add('on');
  }
  $('vClose').addEventListener('click',function(){viewer.classList.remove('on');try{viewVid.pause();}catch(e){}cur=null;});
  $('vDel').addEventListener('click',function(){if(!cur)return;if(confirm('Slet dette element?')){delItem(cur.id).then(function(){viewer.classList.remove('on');cur=null;refreshGallery();});}});
  $('vDownload').addEventListener('click',function(){if(cur)downloadItem(cur);});
  $('vShare').addEventListener('click',function(){if(cur)shareItems([cur]);});

  /* ---------------- Tema ---------------- */
  var SW=['#ffb454','#46d3c8','#ff5a8a','#8a7dff','#5ad17e','#f2f5f7','#ff8f3f'];
  var themeSheet=$('themeSheet');
  function applyTheme(c){document.documentElement.style.setProperty('--amber',c);try{localStorage.setItem('kk_theme',c);}catch(e){}}
  (function initTheme(){try{var c=localStorage.getItem('kk_theme');if(c)applyTheme(c);}catch(e){}})();
  themeChip.addEventListener('click',function(){
    var box=$('swatches');box.innerHTML='';
    var cur=(function(){try{return localStorage.getItem('kk_theme')||'#ffb454';}catch(e){return '#ffb454';}})();
    SW.forEach(function(c){var b=document.createElement('button');b.className='sw'+(c===cur?' active':'');b.style.background=c;
      b.addEventListener('click',function(){applyTheme(c);[].slice.call(box.children).forEach(function(x){x.classList.remove('active');});b.classList.add('active');});
      box.appendChild(b);});
    themeSheet.classList.add('on');
  });
  $('themeClose').addEventListener('click',function(){themeSheet.classList.remove('on');});
  themeSheet.addEventListener('click',function(e){if(e.target===themeSheet)themeSheet.classList.remove('on');});

  /* ---------------- Navigation ---------------- */
  function switchTo(id){
    [].slice.call(document.querySelectorAll('.screen')).forEach(function(s){s.classList.toggle('active',s.id===id);});
    [].slice.call(document.querySelectorAll('.tab')).forEach(function(t){t.classList.toggle('active',t.dataset.screen===id);});
    if(id==='galScreen')refreshGallery();
  }
  [].slice.call(document.querySelectorAll('.tab')).forEach(function(t){t.addEventListener('click',function(){switchTo(t.dataset.screen);});});

  startBtn.addEventListener('click',startCam);
  window.addEventListener('resize',function(){if(current)applyZoom(current);});

  /* ---------------- Start ---------------- */
  buildFilterStrip();
  openDB().then(function(){return refreshGallery();}).catch(function(){err('Kunne ikke åbne lageret på denne enhed.');});
})();
</script>
</body>
</html>
