<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kikkert Kamera</title>
<style>
  :root{
    --bg:#0a0e12;--glass:rgba(255,255,255,.07);--glass-line:rgba(255,255,255,.14);
    --amber:#ffb454;--teal:#46d3c8;--text:#f2f5f7;--muted:#8a97a3;--red:#ff5a5f;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    user-select:none;-webkit-user-select:none}

  .screen{position:fixed;inset:0;display:none}
  .screen.active{display:block}

  /* ---------- KAMERA ---------- */
  #stage{position:absolute;inset:0;bottom:74px;background:#000;overflow:hidden}
  video{position:absolute;top:50%;left:50%;width:100%;height:100%;
    object-fit:cover;transform:translate(-50%,-50%);transform-origin:center}
  #reticle{position:absolute;inset:0;pointer-events:none;opacity:.5;transition:opacity .3s}
  #reticle.hide{opacity:0}
  .ret-line{position:absolute;background:rgba(255,180,84,.55)}
  .ret-h{left:50%;top:50%;width:26px;height:2px;transform:translate(-50%,-50%)}
  .ret-v{left:50%;top:50%;width:2px;height:26px;transform:translate(-50%,-50%)}
  .corner{position:absolute;width:34px;height:34px;border:2px solid rgba(255,255,255,.35)}
  .c-tl{top:14%;left:12%;border-right:none;border-bottom:none}
  .c-tr{top:14%;right:12%;border-left:none;border-bottom:none}
  .c-bl{bottom:16%;left:12%;border-right:none;border-top:none}
  .c-br{bottom:16%;right:12%;border-left:none;border-top:none}

  #topbar{position:absolute;top:0;left:0;right:0;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
    display:flex;justify-content:center;align-items:flex-start;gap:10px}
  #zoomRead{font-variant-numeric:tabular-nums;font-weight:700;font-size:28px;
    color:var(--amber);text-shadow:0 0 18px rgba(255,180,84,.45);line-height:1}
  #zoomRead small{font-size:14px;opacity:.75;font-weight:600}
  #digTag{align-self:center;font-size:10px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:#0a0e12;background:var(--teal);
    padding:3px 8px;border-radius:100px;opacity:0;transition:opacity .2s}
  #digTag.on{opacity:1}

  #rail{position:absolute;right:14px;top:46%;transform:translateY(-50%);
    height:52%;width:52px;display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;gap:8px;touch-action:none}
  #track{position:relative;flex:1;width:44px;border-radius:26px;background:var(--glass);
    border:1px solid var(--glass-line);overflow:hidden}
  #fill{position:absolute;left:0;right:0;bottom:0;
    background:linear-gradient(to top,rgba(255,180,84,.35),rgba(255,180,84,.08))}
  #knob{position:absolute;left:50%;transform:translate(-50%,50%);
    width:40px;height:40px;border-radius:50%;background:var(--amber);
    border:3px solid #1a1f26;box-shadow:0 0 16px rgba(255,180,84,.6);
    display:flex;align-items:center;justify-content:center;font-size:11px;
    font-weight:800;color:#1a1f26}
  .rail-cap{font-size:11px;font-weight:700;color:var(--muted);text-align:center}

  #presets{position:absolute;bottom:14px;left:0;right:0;display:flex;
    justify-content:center;gap:8px;padding:0 12px}
  .preset{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:13px;padding:7px 11px;border-radius:100px;min-width:44px}
  .preset.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}

  #camControls{position:absolute;left:0;right:0;bottom:74px;
    padding-bottom:16px;padding-top:8px;display:flex;align-items:center;
    justify-content:center;gap:40px;background:linear-gradient(to top,rgba(0,0,0,.55),transparent)}
  .round{width:50px;height:50px;border-radius:50%;background:var(--glass);
    border:1px solid var(--glass-line);display:flex;align-items:center;justify-content:center}
  .round svg{width:23px;height:23px;stroke:var(--text);fill:none;stroke-width:2;
    stroke-linecap:round;stroke-linejoin:round}
  .round.on{background:var(--amber);border-color:var(--amber)}
  .round.on svg{stroke:#1a1f26}
  #shutter{width:74px;height:74px;border-radius:50%;background:transparent;
    border:4px solid #fff;display:flex;align-items:center;justify-content:center;padding:0}
  #shutterInner{width:58px;height:58px;border-radius:50%;background:#fff;transition:transform .1s}
  #shutter:active #shutterInner{transform:scale(.86)}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  #flash.pop{animation:pop .28s ease}
  @keyframes pop{0%{opacity:.85}100%{opacity:0}}

  /* ---------- GALLERI ---------- */
  #galHead{position:absolute;top:0;left:0;right:0;z-index:2;
    padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(to bottom,var(--bg),rgba(10,14,18,.85))}
  #galHead h1{font-size:22px;font-weight:800}
  #galHead h1 span{color:var(--amber);font-weight:600;font-size:14px;margin-left:6px}
  #importBtn{background:var(--amber);color:#1a1f26;border:none;font-weight:800;
    font-size:14px;padding:10px 16px;border-radius:100px;display:flex;align-items:center;gap:6px}
  #importBtn svg{width:16px;height:16px;stroke:#1a1f26;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  #grid{position:absolute;inset:0;bottom:74px;overflow-y:auto;
    padding:calc(env(safe-area-inset-top) + 74px) 3px 12px;
    display:grid;grid-template-columns:repeat(3,1fr);gap:3px;align-content:start}
  .cell{position:relative;aspect-ratio:1;background:#151a20;border-radius:4px;overflow:hidden}
  .cell img{width:100%;height:100%;object-fit:cover;display:block}
  #empty{position:absolute;inset:0;bottom:74px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:32px;gap:12px;color:var(--muted)}
  #empty svg{width:56px;height:56px;stroke:var(--muted);fill:none;stroke-width:1.5}
  #empty b{color:var(--text);font-size:17px}

  /* ---------- BUNDMENU ---------- */
  #tabs{position:absolute;bottom:0;left:0;right:0;height:74px;
    padding-bottom:env(safe-area-inset-bottom);display:flex;
    background:#111820;border-top:1px solid var(--glass-line);z-index:3}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;color:var(--muted);font-size:11px;font-weight:700}
  .tab svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--amber)}
  .tab.active svg{stroke:var(--amber)}

  /* ---------- VISER ---------- */
  #viewer{position:fixed;inset:0;background:#000;z-index:10;display:none;flex-direction:column}
  #viewer.on{display:flex}
  #viewImgWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #viewImg{max-width:100%;max-height:100%;object-fit:contain}
  #viewBar{padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;display:flex;
    justify-content:space-between;align-items:center}
  #viewBar button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);
    font-weight:700;font-size:15px;padding:10px 16px;border-radius:100px}
  #delBtn{color:var(--red)!important;border-color:rgba(255,90,95,.4)!important}
  #viewFoot{padding:14px 18px calc(env(safe-area-inset-bottom) + 14px);display:flex;gap:10px;justify-content:center}
  #viewFoot button{flex:1;max-width:200px}

  /* start-overlay */
  #overlay{position:absolute;inset:0;bottom:74px;background:rgba(6,9,12,.94);z-index:4;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;gap:16px}
  #overlay h1{font-size:25px;font-weight:800}
  #overlay h1 span{color:var(--amber)}
  #overlay p{color:var(--muted);font-size:15px;max-width:320px;line-height:1.5}
  #startBtn{margin-top:4px;background:var(--amber);color:#1a1f26;border:none;font-weight:800;
    font-size:17px;padding:14px 32px;border-radius:100px;box-shadow:0 0 24px rgba(255,180,84,.45)}
  .badge{display:flex;align-items:center;gap:9px;color:var(--teal);font-weight:700;
    font-size:13px;letter-spacing:1px;text-transform:uppercase}
  #errMsg{color:var(--red);font-weight:600;display:none}
  .hidden{display:none!important}
  @media (prefers-reduced-motion:reduce){#flash.pop{animation:none}}
</style>
</head>
<body>

<!-- ============ KAMERA ============ -->
<section id="camScreen" class="screen active">
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <div id="reticle">
      <div class="ret-line ret-h"></div><div class="ret-line ret-v"></div>
      <div class="corner c-tl"></div><div class="corner c-tr"></div>
      <div class="corner c-bl"></div><div class="corner c-br"></div>
    </div>
    <div id="flash"></div>
    <div id="topbar"><div id="zoomRead">1.0<small>x</small></div><div id="digTag">Digital</div></div>
    <div id="rail">
      <div class="rail-cap" id="maxCap">-</div>
      <div id="track"><div id="fill"></div><div id="knob">1x</div></div>
      <div class="rail-cap">1x</div>
    </div>
    <div id="presets"></div>

    <div id="overlay">
      <div class="badge">&#9673; Optisk instrument</div>
      <h1>Kikkert <span>Kamera</span></h1>
      <p>Zoom helt ind. Dine billeder gemmes automatisk i galleriet.</p>
      <button id="startBtn">Start kamera</button>
      <p id="errMsg"></p>
    </div>
  </div>

  <div id="camControls">
    <button class="round" id="torchBtn" aria-label="Lygte">
      <svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg>
    </button>
    <button id="shutter" aria-label="Tag foto"><div id="shutterInner"></div></button>
    <button class="round" id="flipBtn" aria-label="Skift kamera">
      <svg viewBox="0 0 24 24"><path d="M21 8a9 9 0 0 0-15-3L3 8"/><path d="M3 3v5h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3"/><path d="M21 21v-5h-5"/></svg>
    </button>
  </div>
</section>

<!-- ============ GALLERI ============ -->
<section id="galScreen" class="screen">
  <div id="galHead">
    <h1>Galleri <span id="galCount"></span></h1>
    <button id="importBtn">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Importer
    </button>
  </div>
  <div id="grid"></div>
  <div id="empty">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    <b>Ingen billeder endnu</b>
    <p style="color:var(--muted);font-size:14px;max-width:260px">Tag et foto med kameraet, eller tryk Importer for at hente billeder fra dit galleri.</p>
  </div>
</section>

<!-- ============ BUNDMENU ============ -->
<nav id="tabs">
  <button class="tab active" data-screen="camScreen">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    Kamera
  </button>
  <button class="tab" data-screen="galScreen">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
    Galleri
  </button>
</nav>

<!-- ============ VISER ============ -->
<div id="viewer">
  <div id="viewBar">
    <button id="closeBtn">Luk</button>
    <button id="delBtn">Slet</button>
  </div>
  <div id="viewImgWrap"><img id="viewImg" alt="Foto"></div>
  <div id="viewFoot"><button id="dlBtn">Gem paa telefon</button></div>
</div>

<input id="fileInput" type="file" accept="image/*" multiple class="hidden">

<script>
(function(){
  /* ---------------- IndexedDB ---------------- */
  const DB_NAME='kikkertkamera', STORE='photos';
  let db=null;
  function openDB(){
    return new Promise((res,rej)=>{
      const r=indexedDB.open(DB_NAME,1);
      r.onupgradeneeded=e=>{const d=e.target.result;
        if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:'id'});};
      r.onsuccess=e=>{db=e.target.result;res(db);};
      r.onerror=e=>rej(e);
    });
  }
  function savePhoto(blob){
    return new Promise((res,rej)=>{
      const id=Date.now()+'-'+Math.random().toString(36).slice(2,7);
      const tx=db.transaction(STORE,'readwrite');
      tx.objectStore(STORE).put({id,blob,created:Date.now()});
      tx.oncomplete=()=>res(id); tx.onerror=e=>rej(e);
    });
  }
  function allPhotos(){
    return new Promise((res,rej)=>{
      const tx=db.transaction(STORE,'readonly');
      const rq=tx.objectStore(STORE).getAll();
      rq.onsuccess=()=>res(rq.result.sort((a,b)=>b.created-a.created));
      rq.onerror=e=>rej(e);
    });
  }
  function deletePhoto(id){
    return new Promise((res,rej)=>{
      const tx=db.transaction(STORE,'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete=()=>res(); tx.onerror=e=>rej(e);
    });
  }

  /* ---------------- Elementer ---------------- */
  const $=id=>document.getElementById(id);
  const video=$('video'),zoomRead=$('zoomRead'),digTag=$('digTag'),rail=$('rail'),
    track=$('track'),fill=$('fill'),knob=$('knob'),maxCap=$('maxCap'),presets=$('presets'),
    overlay=$('overlay'),startBtn=$('startBtn'),errMsg=$('errMsg'),shutter=$('shutter'),
    flipBtn=$('flipBtn'),torchBtn=$('torchBtn'),flash=$('flash'),reticle=$('reticle'),
    grid=$('grid'),empty=$('empty'),galCount=$('galCount'),importBtn=$('importBtn'),
    fileInput=$('fileInput'),viewer=$('viewer'),viewImg=$('viewImg'),closeBtn=$('closeBtn'),
    delBtn=$('delBtn'),dlBtn=$('dlBtn');

  /* ---------------- Kamera ---------------- */
  let stream=null,trackObj=null,caps=null,facing='environment';
  let nativeMin=1,nativeMax=1,hasNativeZoom=false,digitalMaxMult=6,totalMin=1,totalMax=1,current=1;
  let hasTorch=false,torchOn=false;

  function err(m){errMsg.style.display='block';errMsg.innerHTML=m;}
  function insecure(){return !window.isSecureContext||location.protocol==='content:'||location.protocol==='file:';}

  async function startCam(){
    errMsg.style.display='none';
    if(insecure()){err('Aabn appen via din https-adresse (github.io), ikke som lokal fil, saa kan kameraet bruges.');return;}
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){err('Din browser understoetter ikke kamera. Proev Chrome eller Safari.');return;}
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop());
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:3840},height:{ideal:2160}},audio:false});
      video.srcObject=stream;trackObj=stream.getVideoTracks()[0];
      caps=trackObj.getCapabilities?trackObj.getCapabilities():{};
      setupZoom();setupTorch();overlay.classList.add('hidden');
    }catch(e){
      if(e&&e.name==='NotAllowedError')err('Kamera-adgang blev afvist. Tryk "Tillad" naar browseren spoerger.');
      else if(e&&e.name==='NotFoundError')err('Fandt intet kamera.');
      else err('Kunne ikke starte kameraet: '+(e&&e.message?e.message:e));
    }
  }
  function setupZoom(){
    hasNativeZoom=!!(caps&&caps.zoom);
    if(hasNativeZoom){nativeMin=caps.zoom.min||1;nativeMax=caps.zoom.max||1;}else{nativeMin=1;nativeMax=1;}
    totalMin=1;totalMax=Math.max(nativeMax,1)*digitalMaxMult;current=1;
    maxCap.textContent=Math.round(totalMax)+'x';buildPresets();applyZoom(1);
  }
  function buildPresets(){
    presets.innerHTML='';let vals=[1];
    if(nativeMax>=2)vals.push(2);
    if(nativeMax>=3)vals.push(Math.round(nativeMax));
    let d=Math.round(totalMax);[Math.round(totalMax/2),d].forEach(v=>{if(v>vals[vals.length-1])vals.push(v);});
    vals=[...new Set(vals)].filter(v=>v>=1&&v<=totalMax).slice(0,5);
    vals.forEach(v=>{const b=document.createElement('button');b.className='preset';b.dataset.v=v;
      b.textContent=(v>=10?Math.round(v):(v%1?v.toFixed(1):v))+'x';
      b.addEventListener('click',()=>applyZoom(v));presets.appendChild(b);});
  }
  function applyZoom(total){
    total=Math.min(Math.max(total,totalMin),totalMax);current=total;
    let nv=Math.min(total,nativeMax),dig=total/nv;
    if(hasNativeZoom)trackObj.applyConstraints({advanced:[{zoom:nv}]}).catch(()=>{});
    video.style.transform='translate(-50%,-50%) scale('+dig.toFixed(3)+')';
    digTag.classList.toggle('on',dig>1.001);reticle.classList.toggle('hide',total<1.05);
    const s=total>=10?total.toFixed(0):total.toFixed(1);
    zoomRead.innerHTML=s+'<small>x</small>';knob.textContent=(total>=10?total.toFixed(0):total.toFixed(1))+'x';
    const t=Math.log(total/totalMin)/Math.log(totalMax/totalMin),h=track.clientHeight;
    knob.style.bottom=(t*(h-40)+2)+'px';knob.style.top='auto';fill.style.height=(t*100)+'%';
    document.querySelectorAll('.preset').forEach(p=>p.classList.toggle('active',Math.abs(parseFloat(p.dataset.v)-total)<.05));
  }
  let dragging=false;
  function railZoom(y){const r=track.getBoundingClientRect();let t=1-(y-r.top)/r.height;t=Math.min(Math.max(t,0),1);applyZoom(totalMin*Math.pow(totalMax/totalMin,t));}
  function dn(e){dragging=true;mv(e);}function mv(e){if(!dragging)return;e.preventDefault();railZoom(e.touches?e.touches[0].clientY:e.clientY);}function up(){dragging=false;}
  rail.addEventListener('touchstart',dn,{passive:false});rail.addEventListener('touchmove',mv,{passive:false});rail.addEventListener('touchend',up);
  rail.addEventListener('mousedown',dn);window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
  let pStart=0,pZoom=1;
  video.parentElement.addEventListener('touchstart',e=>{if(e.touches.length===2){pStart=dist(e.touches);pZoom=current;}},{passive:false});
  video.parentElement.addEventListener('touchmove',e=>{if(e.touches.length===2){e.preventDefault();applyZoom(pZoom*dist(e.touches)/pStart);}},{passive:false});
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

  function setupTorch(){hasTorch=!!(caps&&caps.torch);torchBtn.style.opacity=hasTorch?'1':'.35';torchOn=false;torchBtn.classList.remove('on');}
  torchBtn.addEventListener('click',()=>{if(!hasTorch)return;torchOn=!torchOn;trackObj.applyConstraints({advanced:[{torch:torchOn}]}).catch(()=>{});torchBtn.classList.toggle('on',torchOn);});
  flipBtn.addEventListener('click',()=>{facing=facing==='environment'?'user':'environment';startCam();});

  shutter.addEventListener('click',()=>{
    if(!video.videoWidth)return;
    const vw=video.videoWidth,vh=video.videoHeight,dig=current/Math.min(current,nativeMax);
    const sw=vw/dig,sh=vh/dig,sx=(vw-sw)/2,sy=(vh-sh)/2;
    const cv=document.createElement('canvas');cv.width=Math.round(sw);cv.height=Math.round(sh);
    const ctx=cv.getContext('2d');
    if(facing==='user'){ctx.translate(cv.width,0);ctx.scale(-1,1);}
    ctx.drawImage(video,sx,sy,sw,sh,0,0,cv.width,cv.height);
    cv.toBlob(async blob=>{try{await savePhoto(blob);await refreshGallery();}catch(e){alert('Kunne ikke gemme billedet.');}},'image/jpeg',.95);
    flash.classList.remove('pop');void flash.offsetWidth;flash.classList.add('pop');
  });

  /* ---------------- Import ---------------- */
  importBtn.addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',async e=>{
    const files=[...e.target.files];
    for(const f of files){if(f.type.startsWith('image/')){try{await savePhoto(f);}catch(_){}}}
    fileInput.value='';await refreshGallery();switchTo('galScreen');
  });

  /* ---------------- Galleri ---------------- */
  let urls=[];
  async function refreshGallery(){
    urls.forEach(u=>URL.revokeObjectURL(u));urls=[];
    const items=await allPhotos();
    galCount.textContent=items.length?items.length+' billeder':'';
    grid.innerHTML='';
    empty.style.display=items.length?'none':'flex';
    grid.style.display=items.length?'grid':'none';
    items.forEach(it=>{
      const u=URL.createObjectURL(it.blob);urls.push(u);
      const cell=document.createElement('div');cell.className='cell';
      const img=document.createElement('img');img.src=u;img.loading='lazy';
      cell.appendChild(img);cell.addEventListener('click',()=>openViewer(it,u));
      grid.appendChild(cell);
    });
  }

  /* ---------------- Viser ---------------- */
  let cur=null;
  function openViewer(it,u){cur=it;viewImg.src=u;viewer.classList.add('on');}
  closeBtn.addEventListener('click',()=>{viewer.classList.remove('on');cur=null;});
  delBtn.addEventListener('click',async()=>{if(!cur)return;if(confirm('Slet dette billede?')){await deletePhoto(cur.id);viewer.classList.remove('on');cur=null;await refreshGallery();}});
  dlBtn.addEventListener('click',()=>{if(!cur)return;const a=document.createElement('a');a.href=viewImg.src;a.download='foto-'+cur.id+'.jpg';a.click();});

  /* ---------------- Navigation ---------------- */
  function switchTo(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.id===id));
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.screen===id));
    if(id==='galScreen')refreshGallery();
  }
  document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTo(t.dataset.screen)));

  startBtn.addEventListener('click',startCam);
  window.addEventListener('resize',()=>{if(current)applyZoom(current);});

  /* ---------------- Start ---------------- */
  openDB().then(()=>refreshGallery()).catch(()=>{err('Kunne ikke aabne lageret paa denne enhed.');});
})();
</script>
</body>
</html>
