<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kikkert Kamera</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--bg:#0a0e12;--glass:rgba(255,255,255,.07);--glass-line:rgba(255,255,255,.14);
    --amber:#ffb454;--teal:#46d3c8;--text:#f2f5f7;--muted:#8a97a3;--red:#ff5a5f;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;user-select:none;-webkit-user-select:none}
  .screen{position:fixed;inset:0;display:none}
  .screen.active{display:block}
  button{font-family:inherit;cursor:pointer}

  /* KAMERA */
  #stage{position:absolute;inset:0;bottom:74px;background:#000;overflow:hidden}
  video{position:absolute;top:50%;left:50%;width:100%;height:100%;object-fit:cover;transform:translate(-50%,-50%);transform-origin:center}
  video.mirror{transform:translate(-50%,-50%) scaleX(-1)}
  #reticle{position:absolute;inset:0;pointer-events:none;opacity:.5;transition:opacity .3s}
  #reticle.hide{opacity:0}
  .ret-line{position:absolute;background:rgba(255,180,84,.55)}
  .ret-h{left:50%;top:50%;width:26px;height:2px;transform:translate(-50%,-50%)}
  .ret-v{left:50%;top:50%;width:2px;height:26px;transform:translate(-50%,-50%)}
  .corner{position:absolute;width:34px;height:34px;border:2px solid rgba(255,255,255,.35)}
  .c-tl{top:14%;left:12%;border-right:none;border-bottom:none}
  .c-tr{top:14%;right:12%;border-left:none;border-bottom:none}
  .c-bl{bottom:16%;left:12%;border-right:none;border-top:none}
  .c-br{bottom:16%;right:12%;border-left:none;border-top:none}
  #grid3{position:absolute;inset:0;pointer-events:none;display:none}
  #grid3.on{display:block}
  #grid3 span{position:absolute;background:rgba(255,255,255,.22)}
  #grid3 .gv1{left:33.33%;top:0;bottom:0;width:1px}
  #grid3 .gv2{left:66.66%;top:0;bottom:0;width:1px}
  #grid3 .gh1{top:33.33%;left:0;right:0;height:1px}
  #grid3 .gh2{top:66.66%;left:0;right:0;height:1px}
  #topbar{position:absolute;top:0;left:0;right:0;padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;
    display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  #topLeft,#topRight{display:flex;gap:8px;align-items:center}
  .chip{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:12px;
    padding:8px 10px;border-radius:100px;display:flex;align-items:center;gap:5px;min-height:34px}
  .chip.on{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  .chip svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  #zoomWrap{position:absolute;top:calc(env(safe-area-inset-top) + 54px);left:0;right:0;display:flex;justify-content:center;pointer-events:none}
  #zoomRead{font-variant-numeric:tabular-nums;font-weight:700;font-size:26px;color:var(--amber);text-shadow:0 0 18px rgba(255,180,84,.45);line-height:1}
  #zoomRead small{font-size:13px;opacity:.75;font-weight:600}
  #digTag{margin-left:8px;align-self:center;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:#0a0e12;background:var(--teal);padding:3px 8px;border-radius:100px;opacity:0;transition:opacity .2s;pointer-events:none}
  #digTag.on{opacity:1}
  #rail{position:absolute;right:12px;top:46%;transform:translateY(-50%);height:46%;width:50px;display:flex;
    flex-direction:column;align-items:center;justify-content:space-between;gap:6px;touch-action:none}
  .rail-cap{font-size:10px;font-weight:700;color:var(--muted);text-align:center}
  #track{position:relative;flex:1;width:42px;border-radius:24px;background:var(--glass);border:1px solid var(--glass-line);overflow:hidden}
  #fill{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(to top,rgba(255,180,84,.35),rgba(255,180,84,.08))}
  #knob{position:absolute;left:50%;transform:translate(-50%,50%);width:38px;height:38px;border-radius:50%;background:var(--amber);
    border:3px solid #1a1f26;box-shadow:0 0 16px rgba(255,180,84,.6);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#1a1f26}
  #filterStrip{position:absolute;left:0;right:0;bottom:150px;z-index:4;display:flex;gap:8px;overflow-x:auto;padding:0 12px 4px;scrollbar-width:none}
  #filterStrip::-webkit-scrollbar{display:none}
  .fchip{flex:0 0 auto;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:12px;padding:7px 12px;border-radius:100px}
  .fchip.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #presets{position:absolute;bottom:104px;left:0;right:0;z-index:4;display:flex;justify-content:center;gap:8px;padding:0 12px}
  .preset{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:12px;padding:6px 10px;border-radius:100px;min-width:40px}
  .preset.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #camControls{position:absolute;left:0;right:0;bottom:74px;padding-bottom:14px;padding-top:8px;display:flex;align-items:center;
    justify-content:center;gap:34px;background:linear-gradient(to top,rgba(0,0,0,.55),transparent)}
  .round{width:50px;height:50px;border-radius:50%;background:var(--glass);border:1px solid var(--glass-line);display:flex;align-items:center;justify-content:center}
  .round svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .round.on{background:var(--amber);border-color:var(--amber)}
  .round.on svg{stroke:#1a1f26}
  #shutter{width:74px;height:74px;border-radius:50%;background:transparent;border:4px solid #fff;display:flex;align-items:center;justify-content:center;padding:0;position:relative}
  #shutterInner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .15s}
  #shutter.rec #shutterInner{width:30px;height:30px;border-radius:8px;background:var(--red)}
  #shutter:active #shutterInner{transform:scale(.9)}
  #recTime{position:absolute;top:-30px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;font-weight:800;font-size:12px;padding:3px 9px;border-radius:100px;display:none;white-space:nowrap}
  #recTime.on{display:block}
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none}
  #flash.pop{animation:pop .28s ease}
  @keyframes pop{0%{opacity:.85}100%{opacity:0}}
  #count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:120px;font-weight:800;color:#fff;text-shadow:0 0 30px rgba(0,0,0,.6);pointer-events:none}
  #count.on{display:flex}
  #qrToast{position:absolute;left:16px;right:16px;bottom:210px;background:#111820;border:1px solid var(--teal);border-radius:14px;padding:14px 16px;display:none;z-index:6}
  #qrToast.on{display:block}
  #qrToast p{font-size:12px;color:var(--muted);margin-bottom:6px}
  #qrToast a{color:var(--teal);font-weight:700;font-size:15px;word-break:break-all}

  /* GALLERI HUB */
  #galHead{position:absolute;top:0;left:0;right:0;z-index:3;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:8px;background:linear-gradient(to bottom,var(--bg),rgba(10,14,18,.92))}
  #galHead h1{font-size:20px;font-weight:800;white-space:nowrap}
  #galHead h1 span{color:var(--amber);font-weight:600;font-size:12px;margin-left:6px}
  #galBtns{display:flex;gap:8px}
  .gbtn{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:13px;padding:9px 12px;border-radius:100px;display:flex;align-items:center;gap:5px}
  .gbtn.amber{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #moduleBar{position:absolute;top:calc(env(safe-area-inset-top) + 60px);left:0;right:0;z-index:2;display:flex;gap:8px;overflow-x:auto;padding:2px 12px 10px;scrollbar-width:none;background:var(--bg)}
  #moduleBar::-webkit-scrollbar{display:none}
  .mchip{flex:0 0 auto;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:13px;padding:8px 14px;border-radius:100px}
  .mchip.active{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #galContent{position:absolute;top:calc(env(safe-area-inset-top) + 110px);left:0;right:0;bottom:74px;overflow-y:auto;padding:2px 3px 20px}
  .dayHead{color:var(--text);font-weight:800;font-size:15px;padding:14px 10px 8px}
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 0 4px}
  .cell{position:relative;aspect-ratio:1;background:#151a20;border-radius:4px;overflow:hidden}
  .cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block}
  .cell .vb{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:100px}
  .cell .fh{position:absolute;bottom:4px;left:4px;font-size:13px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.7))}
  .cell .check{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:rgba(0,0,0,.35);display:none}
  .cell.sel .check{display:block;background:var(--amber);border-color:var(--amber)}
  .cell.sel::after{content:"";position:absolute;inset:0;border:3px solid var(--amber);border-radius:4px}
  .modNote{color:var(--muted);text-align:center;padding:44px 24px;font-size:15px;line-height:1.55}
  .modNote b{color:var(--text);display:block;font-size:17px;margin-bottom:6px}
  #mapDiv{width:100%;border-radius:8px}
  .backChip{display:inline-flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:13px;padding:8px 14px;border-radius:100px;margin:6px 10px 2px}
  .albumCard{display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--glass-line)}
  .albumCard img{width:56px;height:56px;border-radius:10px;object-fit:cover;background:#151a20;flex:0 0 auto}
  .albumCard .an{font-weight:700}
  .albumCard .ac{color:var(--muted);font-size:13px}
  .trashRow{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--glass-line)}
  .trashRow img,.trashRow video{width:52px;height:52px;border-radius:8px;object-fit:cover;background:#151a20;flex:0 0 auto}
  .trashRow .tinfo{flex:1;font-size:13px;color:var(--muted)}
  .trashRow button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:12px;padding:7px 10px;border-radius:100px}
  .trashRow .perm{color:var(--red);border-color:rgba(255,90,95,.4)}
  #selBar{position:absolute;bottom:74px;left:0;right:0;display:none;gap:10px;padding:12px 16px;background:#111820;border-top:1px solid var(--glass-line);z-index:4}
  #selBar.on{display:flex}
  #selBar button{flex:1;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:14px;padding:11px;border-radius:12px}
  #selBar .del{color:var(--red);border-color:rgba(255,90,95,.4)}

  /* BUNDMENU */
  #tabs{position:absolute;bottom:0;left:0;right:0;height:74px;padding-bottom:env(safe-area-inset-bottom);display:flex;background:#111820;border-top:1px solid var(--glass-line);z-index:5}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:11px;font-weight:700;background:none;border:none}
  .tab svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--amber)}
  .tab.active svg{stroke:var(--amber)}

  /* VISER */
  #viewer{position:fixed;inset:0;background:#000;z-index:20;display:none;flex-direction:column}
  #viewer.on{display:flex}
  #viewImgWrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  #viewImg{max-width:100%;max-height:100%;object-fit:contain}
  #viewVid{max-width:100%;max-height:100%}
  #viewBar{padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  #viewBar .grp{display:flex;gap:8px}
  #viewBar button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:15px;padding:10px 14px;border-radius:100px}
  #vTrash{color:var(--red);border-color:rgba(255,90,95,.4)}
  #vFav.fav{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #viewMeta{text-align:center;color:var(--muted);font-size:12px;padding:2px 16px}
  #viewFoot{padding:12px 16px calc(env(safe-area-inset-bottom) + 14px);display:flex;gap:10px;justify-content:center}
  #viewFoot button{flex:1;max-width:140px;background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:14px;padding:12px;border-radius:100px}
  #vShare{background:var(--amber);color:#1a1f26;border-color:var(--amber)}

  /* EDITOR */
  #editor{position:fixed;inset:0;background:#000;z-index:25;display:none;flex-direction:column}
  #editor.on{display:flex}
  #editArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
  #editStage{position:relative;max-width:100%;max-height:100%}
  #editImg{display:block;max-width:100%;max-height:100%;object-fit:contain}
  .ov{position:absolute;transform:translate(-50%,-50%);touch-action:none;cursor:grab;padding:4px 6px;white-space:nowrap}
  .ov.txt{color:#fff;font-weight:800;font-size:28px;text-shadow:0 2px 8px rgba(0,0,0,.6)}
  .ov.emo{font-size:56px;line-height:1}
  .ov.pick{outline:2px dashed rgba(255,255,255,.6)}
  #editTop{padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;display:flex;justify-content:space-between;align-items:center}
  #editTop button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:15px;padding:10px 16px;border-radius:100px}
  #editSave{background:var(--amber);color:#1a1f26;border-color:var(--amber)}
  #editFilters{display:flex;gap:8px;overflow-x:auto;padding:0 12px 6px;scrollbar-width:none}
  #editFilters::-webkit-scrollbar{display:none}
  #editFoot{padding:8px 12px calc(env(safe-area-inset-bottom) + 12px);display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
  #editFoot button{background:var(--glass);border:1px solid var(--glass-line);color:var(--text);font-weight:700;font-size:14px;padding:10px 14px;border-radius:100px}
  #emojiRow{display:none;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 12px 6px}
  #emojiRow.on{display:flex}
  #emojiRow button{font-size:28px;background:var(--glass);border:1px solid var(--glass-line);border-radius:12px;padding:4px 8px;line-height:1}
  #delOv{color:var(--red);border-color:rgba(255,90,95,.4)!important;display:none}
  #delOv.on{display:inline-block}

  #overlay{position:absolute;inset:0;bottom:74px;background:rgba(6,9,12,.94);z-index:8;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;gap:16px}
  #overlay h1{font-size:25px;font-weight:800}
  #overlay h1 span{color:var(--amber)}
  #overlay p{color:var(--muted);font-size:15px;max-width:320px;line-height:1.5}
  #startBtn{margin-top:4px;background:var(--amber);color:#1a1f26;border:none;font-weight:800;font-size:17px;padding:14px 32px;border-radius:100px;box-shadow:0 0 24px rgba(255,180,84,.45)}
  .badge{display:flex;align-items:center;gap:9px;color:var(--teal);font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase}
  #errMsg{color:var(--red);font-weight:600;display:none}
  .hidden{display:none!important}
  #themeSheet{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:none;align-items:flex-end}
  #themeSheet.on{display:flex}
  #themeCard{background:#111820;width:100%;border-radius:20px 20px 0 0;padding:22px 20px calc(env(safe-area-inset-bottom) + 22px)}
  #themeCard h2{font-size:18px;font-weight:800;margin-bottom:14px}
  #swatches{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .sw{width:44px;height:44px;border-radius:50%;border:3px solid transparent}
  .sw.active{border-color:#fff}
  #themeClose{width:100%;background:var(--amber);color:#1a1f26;border:none;font-weight:800;font-size:16px;padding:13px;border-radius:100px}
  @media (prefers-reduced-motion:reduce){#flash.pop{animation:none}}
</style>
</head>
<body>

<section id="camScreen" class="screen active">
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <div id="grid3"><span class="gv1"></span><span class="gv2"></span><span class="gh1"></span><span class="gh2"></span></div>
    <div id="reticle"><div class="ret-line ret-h"></div><div class="ret-line ret-v"></div>
      <div class="corner c-tl"></div><div class="corner c-tr"></div><div class="corner c-bl"></div><div class="corner c-br"></div></div>
    <div id="flash"></div><div id="count"></div>
    <div id="topbar">
      <div id="topLeft">
        <button class="chip" id="timerChip"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg><span id="timerLbl">Off</span></button>
        <button class="chip" id="gridChip"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
      </div>
      <div id="topRight">
        <button class="chip" id="qrChip"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><path d="M14 14h3v3M21 14v7h-7"/></svg>QR</button>
        <button class="chip" id="themeChip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18 4 4 0 0 0 0-8 2 2 0 0 1 0-4 3 3 0 0 0 0-6z"/></svg></button>
      </div>
    </div>
    <div id="zoomWrap"><div id="zoomRead">1.0<small>x</small></div><div id="digTag">Digital</div></div>
    <div id="rail"><div class="rail-cap" id="maxCap">-</div><div id="track"><div id="fill"></div><div id="knob">1x</div></div><div class="rail-cap">1x</div></div>
    <div id="presets"></div>
    <div id="filterStrip"></div>
    <div id="qrToast"><p>QR-kode fundet:</p><a id="qrLink" target="_blank" rel="noopener"></a></div>
    <div id="overlay">
      <div class="badge">&#9673; Optisk instrument</div>
      <h1>Kikkert <span>Kamera</span></h1>
      <p>Zoom, filtre, video og et smart galleri. Tryk start for kamera-adgang.</p>
      <button id="startBtn">Start kamera</button>
      <p id="errMsg"></p>
    </div>
  </div>
  <div id="camControls">
    <button class="round" id="torchBtn" aria-label="Lygte"><svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z"/></svg></button>
    <button id="shutter" aria-label="Tag foto"><span id="recTime">0:00</span><div id="shutterInner"></div></button>
    <button class="round" id="flipBtn" aria-label="Skift kamera"><svg viewBox="0 0 24 24"><path d="M21 8a9 9 0 0 0-15-3L3 8"/><path d="M3 3v5h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3"/><path d="M21 21v-5h-5"/></svg></button>
  </div>
</section>

<section id="galScreen" class="screen">
  <div id="galHead">
    <h1>Galleri <span id="galCount"></span></h1>
    <div id="galBtns">
      <button class="gbtn" id="selectBtn">Vælg</button>
      <button class="gbtn amber" id="importBtn">+ Importer</button>
    </div>
  </div>
  <div id="moduleBar"></div>
  <div id="galContent"></div>
  <div id="selBar"><button id="selShare">Del</button><button id="selDownload">Download</button><button class="del" id="selDelete">Slet</button></div>
</section>

<nav id="tabs">
  <button class="tab active" data-screen="camScreen"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>Kamera</button>
  <button class="tab" data-screen="galScreen"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>Galleri</button>
</nav>

<div id="viewer">
  <div id="viewBar">

  /* ---------- IndexedDB ---------- */
  var DB_NAME='kikkertkamera',STORE='photos',db=null;

  });}
  function updateRec(rec){return new Promise(function(res,rej){var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec);tx.oncomplete=function(){res();};tx.onerror=function(e){rej(e);};});}

  /* ---------- EXIF (dato + GPS) ---------- */
  function readEXIF(buf){try{
    var dv=new DataView(buf);if(dv.getUint16(0)!==0xFFD8)return null;
    var off=2,len=dv.byteLength;
    while(off<len){var m=dv.getUint16(off);if(m===0xFFE1)return parseExif(dv,off+4);
      if((m&0xFF00)!==0xFF00)break;off+=2+dv.getUint16(off+2);}
  }catch(e){}return null;}
  function parseExif(dv,start){
    if(dv.getUint32(start)!==0x45786966)return null;
    var tiff=start+6,little=dv.getUint16(tiff)===0x4949;
    function u16(o){return dv.getUint16(o,little);}function u32(o){return dv.getUint32(o,little);}
    if(u16(tiff+2)!==0x002A)return null;
    var ifd0=tiff+u32(tiff+4),res={},exifPtr=null,gpsPtr=null,i,n,entry,tag;
    n=u16(ifd0);
    for(i=0;i<n;i++){entry=ifd0+2+i*12;tag=u16(entry);if(tag===0x8769)exifPtr=tiff+u32(entry+8);else if(tag===0x8825)gpsPtr=tiff+u32(entry+8);}
    if(exifPtr){n=u16(exifPtr);for(i=0;i<n;i++){entry=exifPtr+2+i*12;tag=u16(entry);if(tag===0x9003){var c=u32(entry+4),o=c>4?tiff+u32(entry+8):entry+8,s='',j;for(j=0;j<c-1;j++)s+=String.fromCharCode(dv.getUint8(o+j));res.date=s;}}}
    if(gpsPtr){var latRef,lngRef,lat,lng;n=u16(gpsPtr);
      function rats(o,cnt){var a=[],k;for(k=0;k<cnt;k++){var nu=u32(o+k*8),de=u32(o+k*8+4);a.push(de?nu/de:0);}return a;}
      for(i=0;i<n;i++){entry=gpsPtr+2+i*12;tag=u16(entry);
        if(tag===1)latRef=String.fromCharCode(dv.getUint8(entry+8));
        else if(tag===3)lngRef=String.fromCharCode(dv.getUint8(entry+8));
        else if(tag===2)lat=rats(tiff+u32(entry+8),3);
        else if(tag===4)lng=rats(tiff+u32(entry+8),3);}
      if(lat&&lng){var la=lat[0]+lat[1]/60+lat[2]/3600;if(latRef==='S')la=-la;var lo=lng[0]+lng[1]/60+lng[2]/3600;if(lngRef==='W')lo=-lo;res.lat=la;res.lng=lo;}}
    return res;
  }

  /* ---------- Kamera ---------- */
  var stream=null,trackObj=null,caps=null,facing='environment',nativeMax=1,hasNativeZoom=false,digitalMaxMult=6,totalMin=1,totalMax=1,current=1,hasTorch=false,torchOn=false;

  function dn(e){dragging=true;mv(e);}function mv(e){if(!dragging)return;e.preventDefault();railZoom(e.touches?e.touches[0].clientY:e.clientY);}function up(){dragging=false;}

  var pStart=0,pZoom=1;

  var TIMERS=[0,3,5,10],ti=0;

  function grabFrame(){var vw=video.videoWidth,vh=video.videoHeight;if(!vw)return null;var dig=current/Math.min(current,nativeMax);
    var sw=vw/dig,sh=vh/dig,sx=(vw-sw)/2,sy=(vh-sh)/2;var cv=document.createElement('canvas');cv.width=Math.round(sw);cv.height=Math.round(sh);

  function takePhoto(){var cv=grabFrame();if(!cv)return;updatePos();flash.classList.remove('pop');void flash.offsetWidth;flash.classList.add('pop');
    cv.toBlob(function(blob){openEditor(blob);},'image/jpeg',.95);}

  var rec=null,chunks=[],recTimer=null,recSecs=0,recording=false;

    try{rec=new MediaRecorder(stream,opts);}catch(e){try{rec=new MediaRecorder(stream);}catch(e2){alert('Video understøttes ikke i denne browser.');return;}}

    rec.onstop=function(){var blob=new Blob(chunks,{type:(rec.mimeType||'video/webm')});saveItem(blob,'video',{taken:Date.now(),lat:lastPos&&lastPos.lat,lng:lastPos&&lastPos.lng}).then(refreshGallery);};
    rec.start();recording=true;shutter.classList.add('rec');recSecs=0;recTime.textContent='0:00';recTime.classList.add('on');

  /* ---------- Editor ---------- */
  var editor=$('editor'),editImg=$('editImg'),editStage=$('editStage'),editFilters=$('editFilters'),emojiRow=$('emojiRow'),delOv=$('delOv');

  /* ---------- Galleri hub ---------- */
  var items=[],itemUrls={},currentMod='alle',selectedAlbum=null,selMode=false,selected={};
  var MODULES=[['alle','Alle'],['steder','Steder'],['kalender','Kalender'],['album','Album'],['favoritter','Favoritter'],['video','Video'],['papirkurv','Papirkurv']];
  function buildModuleBar(){moduleBar.innerHTML='';MODULES.forEach(function(m){var b=el('button','mchip'+(m[0]===currentMod?' active':''),m[1]);b.addEventListener('click',function(){currentMod=m[0];selectedAlbum=null;exitSelect();buildModuleBar();renderModule();});moduleBar.appendChild(b);});}
  function urlFor(it){return itemUrls[it.id];}
  function live(){return items.filter(function(it){return !it.deleted;});}
  function refreshGallery(){Object.keys(itemUrls).forEach(function(k){URL.revokeObjectURL(itemUrls[k]);});itemUrls={};
    return allItems().then(function(list){var now=Date.now();
      var purge=list.filter(function(it){return it.deleted&&it.deletedAt&&(now-it.deletedAt>2592000000);});
      purge.forEach(function(it){delItem(it.id);});
      items=list.filter(function(it){return purge.indexOf(it)<0;});
      items.forEach(function(it){itemUrls[it.id]=URL.createObjectURL(it.blob);});
      var c=live().length;galCount.textContent=c?c+(c===1?' element':' elementer'):'';renderModule();});}

  function dayLabel(ts){var d=new Date(ts),t=new Date();function sd(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
    if(sd(d,t))return 'I dag';var y=new Date(t.getTime()-86400000);if(sd(d,y))return 'I går';return d.getDate()+'. '+MON[d.getMonth()]+' '+d.getFullYear();}
  function monthLabel(ts){var d=new Date(ts);return MONF[d.getMonth()][0].toUpperCase()+MONF[d.getMonth()].slice(1)+' '+d.getFullYear();}
  function fmtMeta(it){var d=new Date(it.taken||it.created);var s=d.getDate()+'. '+MON[d.getMonth()]+' '+d.getFullYear()+' · '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();if(it.lat!=null)s+=' · 📍';if(it.album)s+=' · '+it.album;return s;}

  function buildCell(it){var cell=el('div','cell');cell.dataset.id=it.id;var u=urlFor(it);
    if(it.kind==='video'){var vd=document.createElement('video');vd.src=u;vd.muted=true;vd.playsInline=true;vd.preload='metadata';cell.appendChild(vd);cell.appendChild(el('div','vb','▶'));}
    else{var img=document.createElement('img');img.src=u;img.loading='lazy';cell.appendChild(img);}
    if(it.fav)cell.appendChild(el('div','fh','❤️'));
    cell.appendChild(el('div','check'));
    if(selected[it.id])cell.classList.add('sel');
    cell.addEventListener('click',function(){if(selMode)toggleSel(it.id,cell);else openViewer(it);});
    return cell;}
  function renderGrouped(list,byMonth){galContent.innerHTML='';if(!list.length){galContent.appendChild(noteEmpty());return;}
    var cur=null,g=null;list.forEach(function(it){var lbl=byMonth?monthLabel(it.taken||it.created):dayLabel(it.taken||it.created);
      if(lbl!==cur){cur=lbl;galContent.appendChild(el('div','dayHead',lbl));g=el('div','mgrid');galContent.appendChild(g);}g.appendChild(buildCell(it));});}
  function noteEmpty(){var d=el('div','modNote');d.innerHTML='<b>Ingen billeder her endnu</b>Tag et foto eller en video, eller tryk + Importer.';return d;}
  function byTakenDesc(a,b){return (b.taken||b.created)-(a.taken||a.created);}

  function renderModule(){exitSelectVisual();
    if(currentMod==='alle'){renderGrouped(live().slice().sort(byTakenDesc),false);}
    else if(currentMod==='video'){renderGrouped(live().filter(function(it){return it.kind==='video';}).sort(byTakenDesc),false);}
    else if(currentMod==='favoritter'){renderGrouped(live().filter(function(it){return it.fav;}).sort(byTakenDesc),false);}
    else if(currentMod==='kalender'){renderGrouped(live().slice().sort(byTakenDesc),true);}
    else if(currentMod==='steder'){renderMap();}
    else if(currentMod==='album'){renderAlbum();}
    else if(currentMod==='papirkurv'){renderTrash();}
  }
  function renderMap(){galContent.innerHTML='';var withGeo=live().filter(function(it){return it.lat!=null&&it.lng!=null;});
    if(typeof L==='undefined'){var d=el('div','modNote');d.innerHTML=withGeo.length?('<b>Kort kunne ikke indlæses</b>'+withGeo.length+' billeder har placering. Tjek din internetforbindelse og prøv igen.'):'<b>Ingen billeder med placering</b>Billeder med GPS (taget med appen med placering slået til, eller uploadede med GPS) vises på kortet her.';galContent.appendChild(d);return;}
    if(!withGeo.length){var d2=el('div','modNote');d2.innerHTML='<b>Ingen billeder med placering endnu</b>Slå placering til når appen spørger, så samles dine billeder på kortet. Uploadede billeder med GPS vises også her.';galContent.appendChild(d2);return;}
    var mapDiv=el('div');mapDiv.id='mapDiv';galContent.appendChild(mapDiv);mapDiv.style.height=Math.max(galContent.clientHeight-10,320)+'px';
    setTimeout(function(){try{var map=L.map('mapDiv');var pts=[];L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
      withGeo.forEach(function(it){var mk=L.marker([it.lat,it.lng]).addTo(map);pts.push([it.lat,it.lng]);mk.on('click',function(){openViewer(it);});});
      if(pts.length===1)map.setView(pts[0],14);else map.fitBounds(pts,{padding:[40,40]});setTimeout(function(){map.invalidateSize();},250);}catch(e){}},60);}
  function distinctAlbums(){var a=[];live().forEach(function(it){if(it.album&&a.indexOf(it.album)<0)a.push(it.album);});return a.sort();}
  function renderAlbum(){galContent.innerHTML='';
    if(selectedAlbum){var back=el('button','backChip','‹ Alle album');back.addEventListener('click',function(){selectedAlbum=null;renderModule();});galContent.appendChild(back);
      var list=live().filter(function(it){return it.album===selectedAlbum;}).sort(byTakenDesc);var wrap=el('div');galContent.appendChild(wrap);
      var cur=null,g=null;wrap.appendChild(el('div','dayHead',selectedAlbum));g=el('div','mgrid');wrap.appendChild(g);list.forEach(function(it){g.appendChild(buildCell(it));});
      if(!list.length)wrap.appendChild(el('div','modNote','Tomt album.'));return;}
    var albums=distinctAlbums();if(!albums.length){var d=el('div','modNote');d.innerHTML='<b>Ingen album endnu</b>Åbn et billede, tryk <b>Album</b>, og skriv et navn. Så oprettes albummet automatisk.';galContent.appendChild(d);return;}
    albums.forEach(function(name){var first=live().filter(function(it){return it.album===name;}).sort(byTakenDesc)[0];var cnt=live().filter(function(it){return it.album===name;}).length;
      var card=el('div','albumCard');var img=document.createElement('img');if(first)img.src=urlFor(first);card.appendChild(img);var box=el('div');box.appendChild(el('div','an',name));box.appendChild(el('div','ac',cnt+(cnt===1?' billede':' billeder')));card.appendChild(box);
      card.addEventListener('click',function(){selectedAlbum=name;renderModule();});galContent.appendChild(card);});}
  function renderTrash(){galContent.innerHTML='';var del=items.filter(function(it){return it.deleted;}).sort(function(a,b){return (b.deletedAt||0)-(a.deletedAt||0);});
    if(!del.length){var d=el('div','modNote');d.innerHTML='<b>Papirkurven er tom</b>Slettede billeder ligger her i 30 dage, så du kan fortryde.';galContent.appendChild(d);return;}
    var top=el('div');top.style.padding='4px 10px';var empall=el('button','backChip','Tøm papirkurv');empall.addEventListener('click',function(){if(confirm('Slet alle '+del.length+' elementer permanent?'))Promise.all(del.map(function(it){return delItem(it.id);})).then(refreshGallery);});top.appendChild(empall);galContent.appendChild(top);
    del.forEach(function(it){var row=el('div','trashRow');var u=urlFor(it);if(it.kind==='video'){var vd=document.createElement('video');vd.src=u;vd.muted=true;row.appendChild(vd);}else{var img=document.createElement('img');img.src=u;row.appendChild(img);}
      var info=el('div','tinfo');var left=it.deletedAt?Math.max(0,30-Math.floor((Date.now()-it.deletedAt)/86400000)):30;info.textContent='Slettes om '+left+' dage';row.appendChild(info);
      var restore=el('button',null,'Gendan');restore.addEventListener('click',function(){it.deleted=false;it.deletedAt=null;updateRec(it).then(refreshGallery);});row.appendChild(restore);
      var perm=el('button','perm','Slet');perm.addEventListener('click',function(){if(confirm('Slet permanent?'))delItem(it.id).then(refreshGallery);});row.appendChild(perm);galContent.appendChild(row);});}

  /* select-tilstand */
  function toggleSel(id,cell){if(selected[id]){delete selected[id];cell.classList.remove('sel');}else{selected[id]=true;cell.classList.add('sel');}}
  function exitSelect(){selMode=false;selected={};$('selBar').classList.remove('on');$('selectBtn').textContent='Vælg';}
  function exitSelectVisual(){selected={};$('selBar').classList.remove('on');if(!selMode)$('selectBtn').textContent='Vælg';}
  $('selectBtn').addEventListener('click',function(){selMode=!selMode;selected={};$('selBar').classList.toggle('on',selMode);$('selectBtn').textContent=selMode?'Annullér':'Vælg';renderModule();});
  function selectedItems(){return items.filter(function(it){return selected[it.id];});}
  $('selDelete').addEventListener('click',function(){var s=selectedItems();if(!s.length)return;if(confirm('Flyt '+s.length+' til papirkurv?')){Promise.all(s.map(function(it){it.deleted=true;it.deletedAt=Date.now();return updateRec(it);})).then(function(){exitSelect();refreshGallery();});}});
  $('selDownload').addEventListener('click',function(){selectedItems().forEach(downloadItem);});
  $('selShare').addEventListener('click',function(){shareItems(selectedItems());});

  function downloadItem(it){var u=URL.createObjectURL(it.blob);var a=document.createElement('a');a.href=u;a.download=(it.kind==='video'?'video-':'foto-')+it.id+(it.kind==='video'?'.webm':'.jpg');document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},4000);}
  function shareItems(list){if(!list.length)return;var files=list.map(function(it){return new File([it.blob],(it.kind==='video'?'video-':'foto-')+it.id+(it.kind==='video'?'.webm':'.jpg'),{type:it.blob.type||'image/jpeg'});});
    if(navigator.canShare&&navigator.canShare({files:files})){navigator.share({files:files}).catch(function(){});}else list.forEach(downloadItem);}

  /* ---------- Viser ---------- */
  var cur=null;
  function openViewer(it){cur=it;var u=urlFor(it);
    if(it.kind==='video'){viewImg.classList.add('hidden');viewVid.classList.remove('hidden');viewVid.src=u;}
    else{viewVid.classList.add('hidden');try{viewVid.pause();}catch(e){}viewImg.classList.remove('hidden');viewImg.src=u;}
    $('vFav').innerHTML=it.fav?'♥':'♡';$('vFav').classList.toggle('fav',!!it.fav);viewMeta.textContent=fmtMeta(it);viewer.classList.add('on');}
  function closeViewer(){viewer.classList.remove('on');try{viewVid.pause();}catch(e){}cur=null;}
  $('vBack').addEventListener('click',closeViewer);
  $('vTrash').addEventListener('click',function(){if(!cur)return;if(confirm('Flyt til papirkurv?')){cur.deleted=true;cur.deletedAt=Date.now();updateRec(cur).then(function(){closeViewer();refreshGallery();});}});
  $('vFav').addEventListener('click',function(){if(!cur)return;cur.fav=!cur.fav;updateRec(cur).then(function(){$('vFav').innerHTML=cur.fav?'♥':'♡';$('vFav').classList.toggle('fav',cur.fav);refreshGallery();});});
  $('vDownload').addEventListener('click',function(){if(cur)downloadItem(cur);});
  $('vShare').addEventListener('click',function(){if(cur)shareItems([cur]);});
  $('vAlbum').addEventListener('click',function(){if(!cur)return;var ex=distinctAlbums();var name=prompt('Læg i album — skriv navn:'+(ex.length?'\nEksisterende: '+ex.join(', '):''),cur.album||'');if(name&&name.trim()){cur.album=name.trim();updateRec(cur).then(function(){viewMeta.textContent=fmtMeta(cur);refreshGallery();});}});

  /* ---------- Tema ---------- */
  var SW=['#ffb454','#46d3c8','#ff5a8a','#8a7dff','#5ad17e','#f2f5f7','#ff8f3f'],themeSheet=$('themeSheet');
  function applyTheme(c){document.documentElement.style.setProperty('--amber',c);try{localStorage.setItem('kk_theme',c);}catch(e){}}
  (function(){try{var c=localStorage.getItem('kk_theme');if(c)applyTheme(c);}catch(e){}})();
  themeChip.addEventListener('click',function(){var box=$('swatches');box.innerHTML='';var cu=(function(){try{return localStorage.getItem('kk_theme')||'#ffb454';}catch(e){return '#ffb454';}})();
    SW.forEach(function(c){var b=el('button','sw'+(c===cu?' active':''));b.style.background=c;b.addEventListener('click',function(){applyTheme(c);[].slice.call(box.children).forEach(function(x){x.classList.remove('active');});b.classList.add('active');});box.appendChild(b);});themeSheet.classList.add('on');});
  $('themeClose').addEventListener('click',function(){themeSheet.classList.remove('on');});
  themeSheet.addEventListener('click',function(e){if(e.target===themeSheet)themeSheet.classList.remove('on');});

  /* ---------- Navigation ---------- */
  function switchTo(id){[].slice.call(document.querySelectorAll('.screen')).forEach(function(s){s.classList.toggle('active',s.id===id);});
    [].slice.call(document.querySelectorAll('.tab')).forEach(function(t){t.classList.toggle('active',t.dataset.screen===id);});if(id==='galScreen')refreshGallery();}
  [].slice.call(document.querySelectorAll('.tab')).forEach(function(t){t.addEventListener('click',function(){switchTo(t.dataset.screen);});});
  startBtn.addEventListener('click',startCam);
  window.addEventListener('resize',function(){if(current)applyZoom(current);});

  buildFilterStrip();buildModuleBar();
  openDB().then(function(){return refreshGallery();}).catch(function(){err('Kunne ikke åbne lageret på denne enhed.');});
})();
</script>
</body>
</html>
